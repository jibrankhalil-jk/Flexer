<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="popup.js" defer></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="popup-container">
      <h5 class="title">Flexer</h5>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="gpa">
          <i class="bi bi-mortarboard"></i> GPA
        </button>

        <button class="tab-btn" data-tab="fee">
          <i class="bi bi-cash-stack"></i> Fee
        </button>

        <button class="tab-btn" data-tab="settings">
          <i class="bi bi-gear"></i> Settings
        </button>
      </div>

      <!-- GPA TAB -->
      <div id="gpa" class="tab-content active">
        <div class="section-label">Grade Tools</div>

        <form id="grand-marks" class="mb-2">
          <button class="btn btn-dark btn-sm w-100">Sum Of All Marks</button>
        </form>

        <form id="gpa-calculator" class="mb-2">
          <button class="btn btn-dark btn-sm w-100">
            Turn on GPA Calculator
          </button>
        </form>

        <!-- NEW: Grade Highlighter Feature -->
        <form id="grade-highlighter" class="mb-2">
          <div class="mb-2">
            <label
              class="form-label"
              style="font-size: 11px; font-weight: 600; color: #6c757d"
            >
              HIGHLIGHT MODE
            </label>
            <div class="d-flex gap-2 mb-2">
              <div class="form-check flex-fill">
                <input
                  class="form-check-input"
                  type="radio"
                  name="highlight-mode"
                  id="mode-below"
                  value="below"
                  checked
                />
                <label
                  class="form-check-label"
                  for="mode-below"
                  style="font-size: 12px"
                >
                  Below Grade
                </label>
              </div>
              <div class="form-check flex-fill">
                <input
                  class="form-check-input"
                  type="radio"
                  name="highlight-mode"
                  id="mode-exact"
                  value="exact"
                />
                <label
                  class="form-check-label"
                  for="mode-exact"
                  style="font-size: 12px"
                >
                  Exact Grade
                </label>
              </div>
            </div>
          </div>

          <select id="grade-threshold" class="form-select form-select-sm mb-2">
            <option value="">Select Grade</option>
            <option value="4">A/A+</option>
            <option value="3.67">A-</option>
            <option value="3.33">B+</option>
            <option value="3">B</option>
            <option value="2.67">B-</option>
            <option value="2.33">C+</option>
            <option value="2">C</option>
            <option value="1.67">C-</option>
            <option value="1.33">D+</option>
            <option value="1">D</option>
            <option value="0">F</option>
          </select>

          <button class="btn btn-warning btn-sm w-100">
            <i class="bi bi-highlighter"></i> Highlight Grades
          </button>
        </form>
      </div>

      <!-- FEE TAB -->
      <div id="fee" class="tab-content">
        <div class="section-label">Fee & Feedback</div>

        <form id="fee-calc" class="mb-3">
          <button class="btn btn-dark btn-sm w-100">Calculate Fees</button>
        </form>

        <form id="feedback-form">
          <select name="feedback-radio" class="form-select form-select-sm mb-2">
            <option value="Strongly Agree">Strongly Agree</option>
            <option value="Agree">Agree</option>
            <option value="Uncertain">Uncertain</option>
            <option value="Dissatisfied">Dissatisfied</option>
            <option value="Strongly Disagree">Strongly Disagree</option>
            <option value="Randomize">Randomize</option>
          </select>

          <button class="btn btn-outline-dark btn-sm w-100">
            Submit Feedback
          </button>
        </form>
      </div>

      <!-- SETTINGS TAB -->
      <div id="settings" class="tab-content">
        <div class="section-label">Preferences</div>

        <form id="dark-mode" class="mb-2">
          <button class="btn btn-dark btn-sm w-100">
            Toggle Dark / Light Mode
          </button>
        </form>
      </div>

      <div class="footer">Made with ❤️ by Flexer</div>
    </div>
  </body>
</html>
